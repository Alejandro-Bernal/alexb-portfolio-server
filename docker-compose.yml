services:
  db:
    image: postgres:16-alpine
    container_name: moose-postgres
    environment:
      POSTGRES_USER: moose
      POSTGRES_PASSWORD: moose
      POSTGRES_DB: moose_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moose -d moose_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: moose-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://moose:moose@db:5432/moose_os
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: